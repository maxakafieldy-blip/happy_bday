<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Бронь персонажей Disney</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #faf0e6; margin: 0; padding: 0; color: #333; }
        header { background: #4b0082; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .hero { background: url('https://placehold.co/1920x600/4b0082/white?text=Disney+Party') center/cover no-repeat; color: white; text-align: center; padding: 100px 20px 80px; }
        .hero h1 { font-size: 3em; margin-bottom: 15px; }

        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform .3s, box-shadow .3s; cursor: pointer; position: relative; text-align: center; }
        .card img { width: 100%; height: auto; display: block; padding-top: 20px;}
        .card-content { padding: 15px; }

        /* Занятые персонажи */
        .unavailable { opacity: 0.6; pointer-events: none; cursor: not-allowed; box-shadow: none !important;}
        .unavailable::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.7);
            z-index: 10;
            border-radius: 15px;
        }

        /* Карточка "Добавить своего" */
        .card.add-new {
            background-color:#ffd700;
            color:#4b0082;
            cursor: pointer;
            box-shadow: none;
            border-left: 5px solid #4b0082;
            transition: background-color .3s;
        }
        .card.add-new img {
            filter: grayscale(1) invert(1);
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display:none;
            align-items:center;
            justify-content:center;
            z-index: 1000;
         }
         .modal-content {
             background:#fff;
             padding:35px 45px;
             border-radius:25px;
             width:95%;
             max-width:650px;
             box-shadow:
               0 25px 50px rgba(0, 0, 0, 0.3),
               inset 0 0 0 1px rgba(255,255,255,.4);
              position:relative;
              display: flex;
              flex-direction: column;
              gap: 25px;
         }
         .modal-content h2 {
             margin-top: 0 !important;
             text-align:center;
         }
         .close-btn {
             position: absolute;
             top: 25px;
             right: 35px;
             font-size: 32px;
             font-weight: bold;
             cursor: pointer;
             color:#4b0082;
          }

          .form-group {
              display: flex;
              flex-direction: column;
          }
          .form-group label {
              font-weight: bold;
              margin-bottom: 8px;
          }
          .form-group input {
              padding-right: 45px;
          }
          .form-group input:focus {
              outline:none;
              border-color:#4b0082;
          }
          .clear-input {
              position: absolute;
              right: 15px;
              top: calc(50% - 9px);
              cursor: pointer;
              color:#999;
              font-size:18px;
              display:none;
          }
          .clear-input.show { display:block; }

          .btn-block {
              display: flex;
              justify-content:center;
              gap: 15px;
          }
    </style>
</head>
<body>
    <header>
        <h1>Disney Party</h1>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Пригласи героев Диснея на День Рождения!</h1>
        </div>
    </section>

    <section id="booking" class="container">
        <div class="cards" id="character-list">
            <!-- Карточки будут добавлены скриптом -->
        </div>
    </section>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <span class="close-btn">✖</span>
            
            <h2>Добавить персонажа в бронь</h2>
            
            <div class="form-group">
                <label for="char-name">Имя персонажа</label>
                <input type="text" id="char-name" placeholder="Например, Аладдин">
                <span class="clear-input" id="clear-name">✖</span>
            </div>
            
            <div class="form-group">
                <label for="cartoon-name">Мультфильм</label>
                <input type="text" id="cartoon-name" placeholder="Например, Аладдин (Дисней)">
                <span class="clear-input" id="clear-cartoon">✖</span>
            </div>
            
            <div class="btn-block">
                <button type="button" id="submit-bron" class="btn">Добавить в бронь</button>
                <button type="button" id="cancel-bron" class="btn" style="background:#ccc;">Отмена</button>
            </div>
            
        </div>
    </div>

    <footer style="background:#4b0082; color:#ffd700!important;" class="container">
        <p>Бронь оформляется без сбора персональных данных.</p>
    </footer>    
<script>
  // --- Элементы DOM ---
  const charList = document.getElementById('character-list');
  const modal = document.getElementById('modal-overlay');
  const charNameInput = document.getElementById('char-name');
  const cartoonNameInput = document.getElementById('cartoon-name');
  const clearNameBtn = document.getElementById('clear-name');
  const clearCartoonBtn = document.getElementById('clear-cartoon');

  // --- Состояние ---
  let characters = []; // Здесь будут храниться персонажи

  // --- Загрузка данных из CSV файла ---
  async function loadCharactersFromCSV() {
    try {
      const response = await fetch('character.csv'); // Путь к нашему файлу
      if (!response.ok) throw new Error("Файл CSV не найден");
      
      const csvText = await response.text();
      characters = parseCSV(csvText);
      render(); // Отрисовываем интерфейс после загрузки
    } catch (e) {
      console.error('Ошибка загрузки CSV:', e);
      // Если файл не найден, используем резервные данные
      characters = [
        {name: 'Микки Маус', cartoon: 'Клуб Микки Мауса', booked: true},
        {name: 'Минни Маус', cartoon: 'Клуб Микки Мауса', booked: false},
        {name: 'Дональд Дак', cartoon: 'Утиные Истории', booked: false},
        {name: 'Гуфи', cartoon: 'Клуб Микки Мауса', booked: false}
      ];
      render();
    }
  }

  // --- Парсинг CSV текста в массив объектов ---
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',');
    
    return lines.slice(1).map(line => {
      const values = line.split(',');
      const obj = {};
      
      headers.forEach((header, i) => {
        let value = values[i] || '';
        
        // Преобразуем строку "true" или "false" в логический тип
        if (value === 'true') value = true;
        if (value === 'false') value = false;
        
        obj[header.trim()] = value.trim();
      });
      
      return obj;
    });
  }

  // --- Сохранение данных обратно в CSV (для сохранения брони) ---
  function saveCharactersToCSV() {
    if (characters.length === 0) return;
    
    // Собираем заголовки из первого объекта
    const headers = Object.keys(characters[0]);
    let csvContent = headers.join(',') + '\n';
    
    // Собираем строки данных
    characters.forEach(char => {
      const row = headers.map(h => {
        let val = char[h];
        // Преобразуем булевы значения обратно в строки для записи
        if (val === true || val === false) val = val.toString();
        return `"${val}"`; // Кавычки на случай, если в тексте будут запятые
      });
      csvContent += row.join(',') + '\n';
    });
async function updateCSVOnGitHub(newData) {
  try {
    const response = await fetch('https://api.github.com/repos/maxakafieldy-blip/happy_bday/dispatches', {
      method: 'POST',
      headers: {
        'Authorization': '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',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify({
        event_type: 'update-csv',
        client_payload: {
          csv_data: newData // строка CSV
        }
      })
    });

    if (response.ok) {
      console.log('CSV успешно обновлён на GitHub');
    } else {
      throw new Error('Ошибка GitHub API: ' + response.status);
    }
  } catch (error) {
    console.error('Ошибка обновления CSV:', error);
  }
}

      

  
  // --- Отрисовка карточек персонажей ---
  function render() {
    charList.innerHTML = '';

    characters.forEach(char => {
      const card = document.createElement('div');
      card.className = `card ${char.booked ? 'unavailable' : ''}`;
      
      card.innerHTML = `
        <img src="https://placehold.co/300x250/4b0082/white?text=${encodeURIComponent(char.name)}" alt="${char.name}">
        <div class="card-content">
          <h3>${char.name}</h3>
          ${char.cartoon ? `<p>${char.cartoon}</p>` : ''}
        </div>
      `;

      if (!char.booked) {
        card.addEventListener('click', () => {
          const foundChar = characters.find(c => c.name === char.name);
          if (foundChar) {
            foundChar.booked = true;
            render(); // Обновляем интерфейс
            saveCharactersToCSV(); // Сохраняем изменения в файл
            alert(`Персонаж "${char.name}" забронирован!`);
          }
        });
      }
      
      charList.appendChild(card);
    });

    // Карточка "Добавить своего"
    const addCard = document.createElement('div');
    addCard.className = 'card add-new';
    addCard.innerHTML = `
      <img alt="+" id="019da56a-12bd-7581-9047-b3d8c430ce30">
       <div class="card-content">
           <h3>Добавить своего</h3>
           <p>Не нашли нужного героя?</p>
       </div>
     `;
     addCard.addEventListener('click', () => openModal());
     charList.appendChild(addCard);
   }


   // --- Логика модального окна ---
   function openModal(name = '', cartoon = '') {
     modal.style.display = 'flex';
     charNameInput.value = name || '';
     cartoonNameInput.value = cartoon || '';
     clearNameBtn.style.display = name ? 'block' : 'none';
     clearCartoonBtn.style.display = cartoon ? 'block' : 'none';
   }

   function closeModal() {
     modal.style.display = 'none';
     charNameInput.value = '';
     cartoonNameInput.value = '';
     clearNameBtn.style.display = 'none';
     clearCartoonBtn.style.display = 'none';
   }


   // --- Обработка формы "Добавить своего" ---
   document.getElementById('submit-bron').addEventListener('click', () => {
     const name = charNameInput.value.trim();
     const cartoon = cartoonNameInput.value.trim();
     
     if (!name) {
       alert('Пожалуйста, введите имя персонажа.');
       return;
     }
     
     const isDuplicate = characters.some(c => c.name.toLowerCase() === name.toLowerCase());
     if (isDuplicate) {
       alert('Персонаж с таким именем уже есть в каталоге.');
       return;
     }
     
     characters.push({name, cartoon, booked: true});
     
     closeModal();
     render();
     saveCharactersToCSV(); // Сохраняем нового персонажа в файл
     
     alert(`Персонаж "${name}" добавлен в бронь!`);
   });


   // --- Обработчики закрытия окна ---
   document.getElementById('cancel-bron').addEventListener('click', closeModal);
   document.querySelector('.close-btn').addEventListener('click', closeModal);
   modal.addEventListener('click', (e) => e.target === modal && closeModal());


   // --- Кнопки очистки полей ---
   [clearNameBtn, clearCartoonBtn].forEach(btn => {
     btn.addEventListener('click', () => {
       const inputId = btn.id.replace('clear-', '');
       document.getElementById(inputId).value = '';
       btn.style.display = 'none';
     });
   });

   [charNameInput, cartoonNameInput].forEach(input => {
     input.addEventListener('input', () => {
       const clearBtnId = `clear-${input.id}`;
       document.getElementById(clearBtnId).style.display = input.value ? 'block' : 'none';
     });
   });


   // Запуск приложения при загрузке страницы
   loadCharactersFromCSV();
</script>
</body>
</html>
