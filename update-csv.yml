name: Update CSV File
on:
  repository_dispatch:
    types: [update-csv]
jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update CSV
        run: |
          echo "${{ github.event.client_payload.csv_data }}" > data.csv
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'Update CSV via API'
          file_pattern: data.csv
          branch: main
